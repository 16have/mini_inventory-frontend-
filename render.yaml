services:
  - type: web
    runtime: static
    name: mini-inventory-frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://mini-inventory-backend-1isp.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
